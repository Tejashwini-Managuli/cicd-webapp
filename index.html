<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryVerse</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Test update<h1></h1>
        <h1>StoryVerse</h1>
        <p>Create your own animated AI story</p>

        <!-- Input Section -->
        <div class="input-box">

            <input type="text" id="heroName" placeholder="Enter Hero Name">

            <input type="text" id="place" placeholder="Enter Place">

            <select id="genre">
                <option value="fantasy">Fantasy</option>
                <option value="horror">Horror</option>
                <option value="scifi">Sci-Fi</option>
            </select>

            <button onclick="generateStory()">
                Generate Story
            </button>

        </div>

        <!-- Story Output -->
        <div class="story-box">
            <h2>Your Story</h2>

            <p id="storyOutput">
                Your story will appear here...
            </p>
        </div>

    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
